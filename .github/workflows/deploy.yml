name: Deploy to GitHub Pages

on:
  # Run on every push to main…
  push:
    branches: [main]
  # …and allow manual runs from the Actions tab.
  workflow_dispatch:

# Permissions the official Pages deploy action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; don't cancel an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Auto-derives "/icai_carbon_emission_calculator/" from the repo name,
          # so this keeps working even if the repo is renamed or forked.
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Add SPA fallback (404 -> index for client-side routing)
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
